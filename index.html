<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Counter | Kodai Utsunomiya</title>
    <meta name="description" content="広告なし・完全無料で使えるシンプルな文字数カウントツール">
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        /* =========================================
           1. Base Variables & Reset
           ========================================= */
        :root {
            --primary-color: #2c3e50;    /* Deep Navy */
            --accent-color: #3498db;     /* Blue */
            --text-color: #333333;       /* Dark Grey */
            --light-bg: #f8f9fa;         /* Off White */
            --white: #ffffff;
            --border-color: #e0e0e0;
            --font-sans: "Lato", "Noto Sans JP", "Helvetica Neue", Arial, sans-serif;
            --font-serif: "Noto Serif JP", serif;
        }

        /* Dark Mode Variables */
        html[data-theme="dark"] {
            --primary-color: #ecf0f1;
            --text-color: #d1d5db;
            --light-bg: #121212;
            --white: #1e1e1e;
            --border-color: #333333;
            --accent-color: #5dade2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            line-height: 1.8;
            color: var(--text-color);
            background-color: var(--light-bg);
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        a { color: var(--accent-color); text-decoration: none; transition: color 0.3s ease; }
        a:hover { color: var(--primary-color); text-decoration: underline; }

        .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        .section { margin-bottom: 60px; padding-top: 40px; }

        /* =========================================
           2. Header
           ========================================= */
        header {
            background-color: rgba(255, 255, 255, 0.50);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 1px 15px rgba(0,0,0,0.04);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all 0.3s ease;
        }
        html[data-theme="dark"] header {
            background-color: rgba(18, 18, 18, 0.85);
            border-bottom: 1px solid #333;
            box-shadow: 0 1px 15px rgba(0,0,0,0.5);
        }

        .header-container { display: flex; justify-content: space-between; align-items: center; height: 60px; width: 100%; }
        .logo a { font-family: var(--font-serif); font-size: 1.3rem; font-weight: 700; color: var(--primary-color); text-decoration: none; letter-spacing: 0.02em; }
        html[data-theme="dark"] .logo a { color: #cccccc; }

        .nav-list { display: flex; gap: 25px; list-style: none; align-items: center; }
        .nav-list a { color: var(--text-color); font-weight: 500; font-size: 0.9rem; position: relative; padding: 5px 0; }
        html[data-theme="dark"] .nav-list a { color: #cccccc; }
        .nav-list a::after { content: ''; position: absolute; width: 0; height: 1px; bottom: 0; left: 0; background-color: var(--accent-color); transition: width 0.17s ease; }
        .nav-list a:hover { color: var(--accent-color); text-decoration: none; }
        .nav-list a:hover::after { width: 100%; }

        #theme-toggle { background:none; border:none; cursor:pointer; color: var(--text-color); font-size: 1rem; padding: 5px; transition: transform 0.3s ease, color 0.3s ease; }
        html[data-theme="dark"] #theme-toggle { color: #cccccc; }
        #theme-toggle:hover { transform: scale(1.1); color: var(--accent-color); }

        /* =========================================
           3. Typography & Tool UI
           ========================================= */
        .section-title {
            font-size: 1.5rem;
            color: var(--primary-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-family: var(--font-serif);
        }
        html[data-theme="dark"] .section-title { color: #ffffff; }

        .textarea-wrapper { margin-bottom: 20px; }
        textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--white);
            color: var(--text-color);
            font-family: var(--font-sans);
            font-size: 1rem;
            line-height: 1.6;
            resize: vertical;
            transition: border-color 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease, color 0.3s ease;
        }
        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        /* Buttons */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            margin-bottom: 40px;
        }
        .btn {
            display: inline-block;
            padding: 8px 20px;
            border: 1px solid var(--border-color);
            border-radius: 30px;
            background-color: transparent;
            color: var(--text-color);
            font-size: 0.9rem;
            font-family: var(--font-sans);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background-color: var(--primary-color);
            color: var(--white);
            border-color: var(--primary-color);
        }
        html[data-theme="dark"] .btn { color: #cccccc; }
        html[data-theme="dark"] .btn:hover { color: var(--white); background-color: var(--accent-color); border-color: var(--accent-color); }

        .btn-primary {
            background-color: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }
        .btn-primary:hover {
            background-color: #2980b9;
            border-color: #2980b9;
        }
        html[data-theme="dark"] .btn-primary { color: #fff; }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #666;
            cursor: pointer;
        }
        html[data-theme="dark"] .checkbox-wrapper { color: #aaa; }

        /* =========================================
           4. Cards Grid (Results)
           ========================================= */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--white);
            padding: 20px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.04);
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .stat-label {
            font-size: 0.85rem;
            color: #888;
            font-weight: 700;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        html[data-theme="dark"] .stat-label { color: #aaa; }
        
        .stat-value-wrapper {
            display: flex;
            align-items: baseline;
            gap: 5px;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
            line-height: 1;
        }
        html[data-theme="dark"] .stat-value { color: #ffffff; }
        
        .stat-unit {
            font-size: 0.85rem;
            color: #888;
        }
        html[data-theme="dark"] .stat-unit { color: #aaa; }

        /* =========================================
           5. Footer
           ========================================= */
        footer {
            text-align: center;
            padding: 40px 0;
            color: #888;
            font-size: 0.9rem;
            border-top: 1px solid var(--border-color);
            margin-top: 80px;
            background-color: var(--white);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        html[data-theme="dark"] footer { color: #cccccc; }

        /* Responsive */
        @media (max-width: 768px) {
            .header-container { flex-direction: column; height: auto; padding: 10px 0; }
            .nav-list { margin-top: 10px; gap: 15px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .controls { justify-content: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container header-container">
            <div class="logo"><a href="https://kodai-utsunomiya.vercel.app/">Kodai Utsunomiya</a></div>
            <nav>
                <ul class="nav-list">
                    <li><a href="https://kodai-utsunomiya.vercel.app/"><i class="fas fa-home"></i> Home</a></li>
                    <li>
                        <button id="theme-toggle" aria-label="Toggle Dark Mode">
                            <i class="fas fa-moon"></i>
                        </button>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="section">
            <h2 class="section-title">
                Text Counter 
                <span style="font-size: 0.65em; color: #888; font-weight: 400; margin-left: 8px; font-family: var(--font-sans);">
                    (文字数カウント)
                </span>
            </h2>
            
            <p style="margin-bottom: 20px; font-size: 0.95rem; color: #666;">
                入力データはブラウザ上で処理され，外部に送信されることはありません．
            </p>

            <div class="textarea-wrapper">
                <textarea id="inputText" rows="10" placeholder="ここにテキストを入力または貼り付け..."></textarea>
            </div>

            <div class="controls">
                <button id="countBtn" class="btn btn-primary"><i class="fas fa-calculator"></i> カウント</button>
                <button id="resetBtn" class="btn"><i class="fas fa-trash-alt"></i> クリア</button>
                <button id="copyBtn" class="btn"><i class="fas fa-copy"></i> コピー</button>
                
                <label class="checkbox-wrapper">
                    <input type="checkbox" id="realtime" checked>
                    リアルタイムにカウント
                </label>
            </div>

            <div class="stats-grid">
                <div class="card">
                    <div class="stat-label">文字数</div>
                    <div class="stat-value-wrapper">
                        <div id="count" class="stat-value">0</div>
                        <div class="stat-unit">文字</div>
                    </div>
                </div>
                <div class="card">
                    <div class="stat-label">改行除く</div>
                    <div class="stat-value-wrapper">
                        <div id="withoutCrCount" class="stat-value">0</div>
                        <div class="stat-unit">文字</div>
                    </div>
                </div>
                <div class="card">
                    <div class="stat-label">改行・空白除く</div>
                    <div class="stat-value-wrapper">
                        <div id="withoutCrSpaceCount" class="stat-value">0</div>
                        <div class="stat-unit">文字</div>
                    </div>
                </div>
                <div class="card">
                    <div class="stat-label">行数</div>
                    <div class="stat-value-wrapper">
                        <div id="lines" class="stat-value">0</div>
                        <div class="stat-unit">行</div>
                    </div>
                </div>
                <div class="card">
                    <div class="stat-label">原稿用紙 (400字)</div>
                    <div class="stat-value-wrapper">
                        <div id="manuscriptPages" class="stat-value">0</div>
                        <div class="stat-unit">枚</div>
                    </div>
                </div>
                <div class="card">
                    <div class="stat-label">UTF-8</div>
                    <div class="stat-value-wrapper">
                        <div id="utf8Bytes" class="stat-value">0</div>
                        <div class="stat-unit">Bytes</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 &nbsp; Kodai Utsunomiya. &nbsp; All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        // ==========================================
        // 1. テーマ切り替えロジック
        // ==========================================
        const toggleButton = document.getElementById('theme-toggle');
        const icon = toggleButton.querySelector('i');
        const htmlElement = document.documentElement;

        const updateIcon = (theme) => {
            if (theme === 'dark') {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            }
        };

        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
            htmlElement.setAttribute('data-theme', 'dark');
            updateIcon('dark');
        }

        toggleButton.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateIcon(newTheme);
        });

        // ==========================================
        // 2. 文字数カウントロジック
        // ==========================================
        function updateCounts() {
            const text = document.getElementById('inputText').value;
            const normalizedText = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            
            // サロゲートペア (絵文字など) を考慮した文字配列化
            const chars = [...normalizedText];
            
            const totalCount = chars.length;
            const textWithoutCr = normalizedText.replace(/\n/g, '');
            const withoutCrCount = [...textWithoutCr].length;
            
            // 全角・半角スペース，タブ，改行を除外
            const textWithoutCrSpace = normalizedText.replace(/[\n\s\t　]/g, '');
            const withoutCrSpaceCount = [...textWithoutCrSpace].length;
            
            const lines = normalizedText === '' ? 0 : normalizedText.split('\n').length;
            
            // 原稿用紙換算
            let totalRows = 0;
            if (normalizedText !== '') {
                const lineArray = normalizedText.split('\n');
                for (let line of lineArray) {
                    const len = [...line].length;
                    if (len === 0) {
                        totalRows += 1;
                    } else {
                        totalRows += Math.ceil(len / 20);
                    }
                }
            }
            const manuscriptPages = Math.ceil(totalRows / 20);
            const utf8Bytes = new Blob([normalizedText]).size;
            
            // DOM更新
            document.getElementById('count').textContent = totalCount;
            document.getElementById('withoutCrCount').textContent = withoutCrCount;
            document.getElementById('withoutCrSpaceCount').textContent = withoutCrSpaceCount;
            document.getElementById('lines').textContent = lines;
            document.getElementById('manuscriptPages').textContent = manuscriptPages;
            document.getElementById('utf8Bytes').textContent = utf8Bytes;
        }

        // イベントリスナー
        document.getElementById('inputText').addEventListener('input', function() {
            if (document.getElementById('realtime').checked) {
                updateCounts();
            }
        });

        document.getElementById('countBtn').addEventListener('click', updateCounts);

        document.getElementById('resetBtn').addEventListener('click', function() {
            if(confirm('入力内容をクリアしますか？')) {
                document.getElementById('inputText').value = '';
                updateCounts();
                document.getElementById('inputText').focus();
            }
        });

        document.getElementById('copyBtn').addEventListener('click', function() {
            const text = document.getElementById('inputText').value;
            if (!text) return;
            
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copyBtn');
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> コピー完了';
                
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                }, 2000);
            }).catch(err => {
                alert('コピーに失敗');
            });
        });

        // 初期化
        updateCounts();
        document.getElementById('inputText').focus();
    </script>
</body>
</html>
